server:
  port: 8761

spring:
  application:
    name: eureka-server
  security:
    basic:
      enabled: false   # 关闭认证

eureka:
  instance:
    hostname: localhost
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://localhost:8761/eureka/
  server:
    enable-self-preservation: true
    eviction-interval-timer-in-ms: 60000